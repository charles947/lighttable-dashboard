<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightTable — Account Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f2;
  --white: #ffffff;
  --border: #e4e0d8;
  --border-dark: #c8c3b8;
  --text: #1c1a17;
  --text-mid: #4a4640;
  --text-muted: #8a857c;
  --text-faint: #b8b3aa;

  --lt-red: #c0392b;
  --lt-red-light: #fdf0ee;
  --lt-red-mid: #e8b4ae;

  --tier1: #1a6b4a; --tier1-light: #e8f5ee; --tier1-mid: #b8deca;
  --tier2: #b05c00; --tier2-light: #fdf0e0; --tier2-mid: #f0c88a;
  --tier3: #4a4640; --tier3-light: #f0eeeb; --tier3-mid: #c8c3b8;

  --peer-yes: #1a6b4a; --peer-yes-bg: #e8f5ee;
  --peer-no: #c0392b; --peer-no-bg: #fdf0ee;
  --peer-unknown: #8a857c; --peer-unknown-bg: #f0eeeb;

  --seg-dev: #1a4f8a; --seg-dev-bg: #e8f0fb;
  --seg-gc: #6a1a8a; --seg-gc-bg: #f0e8fb;
  --seg-reif: #1a6b4a; --seg-reif-bg: #e8f5ee;
  --seg-dc: #b05c00; --seg-dc-bg: #fdf0e0;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; }

/* HEADER */
.header { background:var(--text); color:var(--white); padding:24px 40px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:16px; }
.logo { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--white); letter-spacing:-.01em; }
.logo span { color:var(--lt-red); }
.header-eyebrow { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.4); }
.header-divider { width:1px; height:32px; background:rgba(255,255,255,.15); }
.header-stats { display:flex; gap:32px; }
.header-stat { display:flex; flex-direction:column; gap:2px; }
.header-stat-val { font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:500; color:var(--white); line-height:1; }
.header-stat-lbl { font-size:9px; color:rgba(255,255,255,.4); letter-spacing:.1em; text-transform:uppercase; }
.refresh-btn { display:flex; align-items:center; gap:6px; padding:8px 16px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:4px; color:rgba(255,255,255,.7); font-size:11px; font-family:'IBM Plex Mono',monospace; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; transition:all .15s; }
.refresh-btn:hover { background:rgba(255,255,255,.14); color:var(--white); }
.refresh-btn.spinning svg { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PAGE */
.page { max-width:1400px; margin:0 auto; padding:40px 40px 80px; }

/* NAV */
.nav { display:flex; gap:0; border-bottom:2px solid var(--text); margin-bottom:40px; }
.nav-tab { padding:10px 22px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:var(--text-muted); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .15s; white-space:nowrap; }
.nav-tab:hover { color:var(--text); }
.nav-tab.active { color:var(--text); border-bottom-color:var(--lt-red); font-weight:600; }

/* SECTION LABEL */
.section-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); margin-bottom:16px; display:flex; align-items:center; gap:12px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* FILTER BAR */
.filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px; }
.filter-btn { padding:5px 13px; border-radius:20px; font-size:11px; font-weight:500; border:1px solid var(--border-dark); background:transparent; color:var(--text-muted); cursor:pointer; transition:all .15s; white-space:nowrap; }
.filter-btn:hover { border-color:var(--text); color:var(--text); }
.filter-btn.active { background:var(--text); color:var(--white); border-color:var(--text); }

/* ACCOUNT GRID */
.account-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:14px; }
.account-card { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:20px; cursor:pointer; transition:box-shadow .15s, transform .15s; position:relative; overflow:hidden; }
.account-card:hover { box-shadow:0 6px 28px rgba(0,0,0,.1); transform:translateY(-2px); }
.account-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.account-card.tier1::before { background:var(--tier1); }
.account-card.tier2::before { background:var(--tier2); }
.account-card.tier3::before { background:var(--tier3); }

.card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.card-name { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--text); line-height:1.2; }
.card-segment { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); margin-top:3px; }
.icp-badge { display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:3px; font-size:9px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; flex-shrink:0; }
.icp-badge.tier1 { background:var(--tier1-light); color:var(--tier1); border:1px solid var(--tier1-mid); }
.icp-badge.tier2 { background:var(--tier2-light); color:var(--tier2); border:1px solid var(--tier2-mid); }
.icp-badge.tier3 { background:var(--tier3-light); color:var(--tier3); border:1px solid var(--tier3-mid); }

.score-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.score-num { font-family:'IBM Plex Mono',monospace; font-size:26px; font-weight:500; color:var(--text); line-height:1; }
.score-denom { font-size:11px; color:var(--text-muted); }
.score-track { flex:1; height:5px; background:var(--bg); border-radius:3px; border:1px solid var(--border); overflow:hidden; }
.score-fill { height:100%; border-radius:3px; transition:width .4s; }
.score-fill.tier1 { background:var(--tier1); }
.score-fill.tier2 { background:var(--tier2); }
.score-fill.tier3 { background:var(--tier3); }

.card-pills { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px; }
.pill { padding:2px 7px; border-radius:3px; font-size:9px; font-weight:500; border:1px solid var(--border); background:var(--bg); color:var(--text-mid); white-space:nowrap; }
.pill.peer-yes { background:var(--peer-yes-bg); color:var(--peer-yes); border-color:var(--tier1-mid); }
.pill.peer-unknown { background:var(--peer-unknown-bg); color:var(--peer-unknown); }
.pill.peer-no { background:var(--peer-no-bg); color:var(--peer-no); border-color:var(--lt-red-mid); }

.card-meta { display:flex; gap:16px; padding-top:12px; border-top:1px solid var(--border); }
.card-meta-item { display:flex; flex-direction:column; gap:2px; }
.card-meta-val { font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:500; color:var(--text); }
.card-meta-lbl { font-size:9px; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; }

/* SEGMENT TAG */
.seg-tag { display:inline-flex; padding:3px 8px; border-radius:3px; font-size:9px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; white-space:nowrap; }
.seg-tag.Developer { background:var(--seg-dev-bg); color:var(--seg-dev); }
.seg-tag.GC { background:var(--seg-gc-bg); color:var(--seg-gc); }
.seg-tag.REIF { background:var(--seg-reif-bg); color:var(--seg-reif); }
.seg-tag.DC { background:var(--seg-dc-bg); color:var(--seg-dc); }

/* BACK BTN */
.back-btn { display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--text-muted); cursor:pointer; margin-bottom:28px; border:none; background:none; padding:0; transition:color .15s; font-family:'IBM Plex Mono',monospace; letter-spacing:.06em; text-transform:uppercase; }
.back-btn:hover { color:var(--text); }
.back-btn::before { content:'←'; }

/* DEEP DIVE */
.dive-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:20px; }
.dive-title { font-family:'Playfair Display',serif; font-size:34px; font-weight:700; color:var(--text); line-height:1.1; }
.dive-sub { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); margin-top:6px; }
.dive-stats { display:flex; gap:24px; flex-wrap:wrap; }
.dive-stat { display:flex; flex-direction:column; gap:2px; text-align:right; }
.dive-stat-val { font-family:'Playfair Display',serif; font-size:30px; font-weight:700; color:var(--text); line-height:1; }
.dive-stat-lbl { font-size:9px; color:var(--text-muted); letter-spacing:.1em; text-transform:uppercase; }

.dive-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:32px; }
@media(max-width:900px){.dive-grid{grid-template-columns:1fr;}}
.dive-card { background:var(--white); border:1px solid var(--border); border-radius:8px; padding:20px 22px; }
.dive-card-title { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--text-mid); margin-bottom:12px; }

.info-row { display:flex; gap:8px; align-items:baseline; margin-bottom:7px; }
.info-label { font-size:9px; font-family:'IBM Plex Mono',monospace; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); width:120px; flex-shrink:0; }
.info-value { font-size:12px; color:var(--text-mid); line-height:1.5; }
.info-value a { color:var(--lt-red); text-decoration:none; }
.info-value a:hover { text-decoration:underline; }

/* PEER REVIEW BLOCK */
.peer-block { border-radius:6px; padding:14px 16px; margin-bottom:4px; }
.peer-block.yes { background:var(--peer-yes-bg); border:1px solid var(--tier1-mid); }
.peer-block.unknown { background:var(--peer-unknown-bg); border:1px solid var(--border); }
.peer-block.no { background:var(--peer-no-bg); border:1px solid var(--lt-red-mid); }
.peer-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:600; margin-bottom:4px; }
.peer-block.yes .peer-label { color:var(--tier1); }
.peer-block.unknown .peer-label { color:var(--peer-unknown); }
.peer-block.no .peer-label { color:var(--lt-red); }
.peer-headline { font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:var(--text); line-height:1.3; }

/* TECH PILLS */
.tech-pills { display:flex; flex-wrap:wrap; gap:5px; }
.tech-pill { padding:3px 9px; border-radius:3px; font-size:10px; background:var(--bg); border:1px solid var(--border-dark); color:var(--text-mid); }
.tech-pill.procore { background:#e8f0fb; color:#1a4f8a; border-color:#a8c4e8; }
.tech-pill.bluebeam { background:#fdf0e0; color:#b05c00; border-color:#f0c88a; }
.tech-pill.autodesk { background:#fce8e8; color:#8a1a1a; border-color:#f4c0c0; }

/* CONTACTS TABLE */
.contacts-table { width:100%; border-collapse:collapse; }
.contacts-table th { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); padding:8px 12px; text-align:left; border-bottom:1px solid var(--border-dark); background:var(--bg); }
.contacts-table td { font-size:11px; padding:10px 12px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text-mid); }
.contacts-table tr:last-child td { border-bottom:none; }
.contacts-table tr:hover td { background:#faf9f7; }
.contact-name { font-weight:600; color:var(--text); }
.contact-link { color:var(--lt-red); text-decoration:none; font-size:10px; margin-left:4px; opacity:.7; transition:opacity .15s; }
.contact-link:hover { opacity:1; }
.status-pill { display:inline-flex; padding:2px 7px; border-radius:3px; font-size:9px; font-weight:600; letter-spacing:.04em; background:var(--bg); border:1px solid var(--border-dark); color:var(--text-muted); }
.status-pill.active { background:var(--tier1-light); color:var(--tier1); border-color:var(--tier1-mid); }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:300px; gap:14px; }
.loading-spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--text); border-radius:50%; animation:spin .7s linear infinite; }
.loading-text { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); }

/* ERROR */
.error-block { background:#fdf0ee; border:1px solid var(--lt-red-mid); border-radius:6px; padding:16px 20px; font-size:12px; color:var(--lt-red); }

/* SCORECARD TABLE */
.score-table { width:100%; border-collapse:collapse; background:var(--white); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.score-table th { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-muted); padding:10px 14px; text-align:left; border-bottom:1px solid var(--border-dark); background:var(--bg); cursor:pointer; user-select:none; white-space:nowrap; }
.score-table th:hover { color:var(--text); }
.score-table th.sorted { color:var(--text); }
.score-table td { font-size:11px; padding:11px 14px; border-bottom:1px solid var(--border); vertical-align:middle; color:var(--text-mid); }
.score-table tr:last-child td { border-bottom:none; }
.score-table tr:hover td { background:#faf9f7; cursor:pointer; }

@media(max-width:768px){.page{padding:24px 16px 60px;}.header{padding:16px;}.dive-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-eyebrow">Primary Venture Partners · GTM Intelligence</div>
      <div class="logo">Light<span>Table</span></div>
    </div>
    <div class="header-divider"></div>
    <div class="header-stats">
      <div class="header-stat">
        <div class="header-stat-val" id="stat-accounts">—</div>
        <div class="header-stat-lbl">Accounts</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-val" id="stat-contacts">—</div>
        <div class="header-stat-lbl">Contacts</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-val" id="stat-peer">—</div>
        <div class="header-stat-lbl">Peer Review Confirmed</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-val" id="stat-tier1">—</div>
        <div class="header-stat-lbl">Tier 1 Accounts</div>
      </div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()" id="refresh-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    Refresh
  </button>
</div>

<div class="page">
  <div class="nav">
    <button class="nav-tab active" onclick="showView('accounts',this)">Account Readiness</button>
    <button class="nav-tab" onclick="showView('scorecard',this)">Scorecard</button>
  </div>

  <div id="view-accounts"></div>
  <div id="view-scorecard" style="display:none"></div>
</div>

<script>
const N8N_API_URL = 'https://primarycharles.app.n8n.cloud/webhook/LT-Data';
let ACCOUNTS = [];
let CONTACTS = [];
let currentFilter = 'all';
let scorecardSort = { key: 'icp_score', dir: -1 };

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const res = await fetch(N8N_API_URL);
    const data = await res.json();
    ACCOUNTS = (data.accounts || []).filter(a => a.company_name && a.company_name.trim());
    CONTACTS = (data.contacts || []).filter(c => c.contact_name && c.contact_name.trim());
    updateStats();
    renderCurrentView();
  } catch(e) {
    document.getElementById('view-accounts').innerHTML = `<div class="error-block">Failed to load data from n8n. Make sure the LightTable-Data workflow is active.<br><br>Error: ${e.message}</div>`;
  }
  btn.classList.remove('spinning');
}

function updateStats() {
  document.getElementById('stat-accounts').textContent = ACCOUNTS.length;
  document.getElementById('stat-contacts').textContent = CONTACTS.length;
  document.getElementById('stat-peer').textContent = ACCOUNTS.filter(a => a.peer_review_confirmed === 'Yes').length;
  document.getElementById('stat-tier1').textContent = ACCOUNTS.filter(a => a.icp_tier === 'Tier 1').length;
}

// ── HELPERS ──
function tierClass(tier) {
  if (!tier) return 'tier3';
  if (tier.includes('1')) return 'tier1';
  if (tier.includes('2')) return 'tier2';
  return 'tier3';
}

function segClass(seg) {
  if (!seg) return '';
  if (seg.includes('Developer')) return 'Developer';
  if (seg.includes('GC') || seg.includes('CMAR')) return 'GC';
  if (seg.includes('REIF')) return 'REIF';
  if (seg.includes('Data Center')) return 'DC';
  return '';
}

function peerClass(val) {
  if (val === 'Yes') return 'peer-yes';
  if (val === 'No') return 'peer-no';
  return 'peer-unknown';
}

function techPillClass(tool) {
  const t = tool.toLowerCase();
  if (t.includes('procore')) return 'procore';
  if (t.includes('bluebeam')) return 'bluebeam';
  if (t.includes('autodesk')) return 'autodesk';
  return '';
}

function scoreColor(score) {
  const s = parseFloat(score);
  if (s >= 8) return 'tier1';
  if (s >= 6) return 'tier2';
  return 'tier3';
}

function contactsForAccount(name) {
  return CONTACTS.filter(c => c.company_name && c.company_name.trim().toLowerCase() === name.trim().toLowerCase());
}

// ── VIEW ROUTING ──
function showView(view, btn) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#view-accounts,#view-scorecard').forEach(e => e.style.display = 'none');
  document.getElementById(`view-${view}`).style.display = 'block';
  if (view === 'accounts') renderAccounts();
  else if (view === 'scorecard') renderScorecard();
}

function renderCurrentView() {
  const activeTab = document.querySelector('.nav-tab.active');
  const view = activeTab ? activeTab.getAttribute('onclick').match(/'(\w+)'/)[1] : 'accounts';
  if (view === 'accounts') renderAccounts();
  else if (view === 'scorecard') renderScorecard();
}

// ── ACCOUNT GRID ──
function renderAccounts() {
  const el = document.getElementById('view-accounts');
  if (!ACCOUNTS.length) { el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading accounts…</div></div>'; return; }

  const filters = [
    { id: 'all', label: 'All Accounts' },
    { id: 'tier1', label: 'Tier 1' },
    { id: 'tier2', label: 'Tier 2' },
    { id: 'peer', label: 'Peer Review Confirmed' },
    { id: 'developer', label: 'Developer' },
    { id: 'gc', label: 'GC / CMAR' },
    { id: 'reif', label: 'REIF' },
  ];

  let html = `<div class="section-label">Account Readiness — ${ACCOUNTS.length} accounts</div>
    <div class="filter-bar">`;
  filters.forEach(f => {
    html += `<button class="filter-btn ${f.id === currentFilter ? 'active' : ''}" onclick="filterAccounts('${f.id}')">${f.label}</button>`;
  });
  html += `</div><div class="account-grid">`;

  const sorted = [...ACCOUNTS].sort((a, b) => parseFloat(b.icp_score || 0) - parseFloat(a.icp_score || 0));

  sorted.forEach(acc => {
    const tc = tierClass(acc.icp_tier);
    const sc = segClass(acc.segment);
    const contacts = contactsForAccount(acc.company_name);
    const techTools = acc.tech_stack ? acc.tech_stack.split('|').map(t => t.trim()).filter(Boolean) : [];
    const score = parseFloat(acc.icp_score || 0);

    const show = currentFilter === 'all'
      || (currentFilter === 'tier1' && acc.icp_tier === 'Tier 1')
      || (currentFilter === 'tier2' && acc.icp_tier === 'Tier 2')
      || (currentFilter === 'peer' && acc.peer_review_confirmed === 'Yes')
      || (currentFilter === 'developer' && acc.segment && acc.segment.includes('Developer'))
      || (currentFilter === 'gc' && acc.segment && (acc.segment.includes('GC') || acc.segment.includes('CMAR')))
      || (currentFilter === 'reif' && acc.segment && acc.segment.includes('REIF'));
    if (!show) return;

    html += `<div class="account-card ${tc}" onclick="openDive('${acc.company_name.replace(/'/g,"\\'")}')">
      <div class="card-top">
        <div>
          <div class="card-name">${acc.company_name}</div>
          <div class="card-segment">${acc.segment || '—'} · ${acc.hq_location || '—'}</div>
        </div>
        <div class="icp-badge ${tc}">${acc.icp_tier || '—'}</div>
      </div>

      <div class="score-row">
        <div><span class="score-num">${acc.icp_score || '—'}</span><span class="score-denom">/10</span></div>
        <div class="score-track"><div class="score-fill ${scoreColor(acc.icp_score)}" style="width:${score * 10}%"></div></div>
      </div>

      <div class="card-pills">
        <span class="pill ${peerClass(acc.peer_review_confirmed)}">Peer Review: ${acc.peer_review_confirmed || 'Unknown'}</span>
        <span class="pill">${acc.current_phase || '—'} Phase</span>
        ${acc.sequence_status ? `<span class="pill">${acc.sequence_status}</span>` : ''}
      </div>

      <div class="card-pills">
        ${techTools.slice(0,3).map(t => `<span class="pill ${techPillClass(t)}">${t}</span>`).join('')}
      </div>

      <div class="card-meta">
        <div class="card-meta-item">
          <div class="card-meta-val">${acc.projects_per_year ? acc.projects_per_year.replace("'","") : '—'}</div>
          <div class="card-meta-lbl">Projects/yr</div>
        </div>
        <div class="card-meta-item">
          <div class="card-meta-val">${contacts.length}</div>
          <div class="card-meta-lbl">Contacts</div>
        </div>
        <div class="card-meta-item">
          <div class="card-meta-val">${acc.project_types ? acc.project_types.split('|').length : '—'}</div>
          <div class="card-meta-lbl">Project Types</div>
        </div>
      </div>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

function filterAccounts(f) { currentFilter = f; renderAccounts(); }

// ── DEEP DIVE ──
function openDive(name) {
  const acc = ACCOUNTS.find(a => a.company_name === name);
  if (!acc) return;
  const contacts = contactsForAccount(name);
  const tc = tierClass(acc.icp_tier);
  const techTools = acc.tech_stack ? acc.tech_stack.split('|').map(t => t.trim()).filter(Boolean) : [];
  const projectTypes = acc.project_types ? acc.project_types.split('|').map(t => t.trim()).filter(Boolean) : [];
  const score = parseFloat(acc.icp_score || 0);
  const peerVal = acc.peer_review_confirmed || 'Unknown';
  const peerCls = peerVal === 'Yes' ? 'yes' : peerVal === 'No' ? 'no' : 'unknown';
  const peerMsg = peerVal === 'Yes'
    ? '✓ Confirmed — this account conducts formal internal peer review. Strong ICP signal.'
    : peerVal === 'No'
    ? '✗ No peer review process. Potential ICP disqualifier — flag before intro call.'
    : 'Peer review status unknown. Must confirm on first call before qualifying further.';

  document.querySelectorAll('#view-accounts,#view-scorecard').forEach(e => e.style.display = 'none');
  const el = document.getElementById('view-accounts');
  el.style.display = 'block';

  let html = `<button class="back-btn" onclick="renderAccounts()">Back to All Accounts</button>

  <div class="dive-header">
    <div>
      <div class="section-label" style="margin-bottom:8px">Account Deep Dive</div>
      <div class="dive-title">${acc.company_name}</div>
      <div class="dive-sub">${acc.segment || '—'} · ${acc.hq_location || '—'}</div>
    </div>
    <div class="dive-stats">
      <div class="dive-stat"><div class="dive-stat-val">${acc.icp_score || '—'}<span style="font-size:14px;color:var(--text-muted)">/10</span></div><div class="dive-stat-lbl">ICP Score</div></div>
      <div class="dive-stat"><div class="dive-stat-val">${contacts.length}</div><div class="dive-stat-lbl">Contacts</div></div>
      <div class="dive-stat"><div class="dive-stat-val">${acc.projects_per_year ? acc.projects_per_year.replace("'","") : '—'}</div><div class="dive-stat-lbl">Projects/yr</div></div>
    </div>
  </div>

  <div class="section-label" style="margin-bottom:16px">Qualification</div>
  <div class="dive-grid" style="margin-bottom:32px">
    <div class="dive-card">
      <div class="dive-card-title">Peer Review Status</div>
      <div class="peer-block ${peerCls}">
        <div class="peer-label">Peer Review: ${peerVal}</div>
        <div class="peer-headline">${peerMsg}</div>
      </div>
    </div>
    <div class="dive-card">
      <div class="dive-card-title">Account Details</div>
      <div class="info-row"><span class="info-label">Segment</span><span class="info-value"><span class="seg-tag ${segClass(acc.segment)}">${acc.segment || '—'}</span></span></div>
      <div class="info-row"><span class="info-label">ICP Tier</span><span class="info-value"><span class="icp-badge ${tc}">${acc.icp_tier || '—'}</span></span></div>
      <div class="info-row"><span class="info-label">Location</span><span class="info-value">${acc.hq_location || '—'}</span></div>
      <div class="info-row"><span class="info-label">Projects/yr</span><span class="info-value">${acc.projects_per_year ? acc.projects_per_year.replace("'","") : '—'}</span></div>
      <div class="info-row"><span class="info-label">Avg Sq Ft</span><span class="info-value">${acc.avg_project_sqft ? Number(acc.avg_project_sqft).toLocaleString() + ' sq ft' : '—'}</span></div>
      <div class="info-row"><span class="info-label">Current Phase</span><span class="info-value">${acc.current_phase || '—'}</span></div>
      <div class="info-row"><span class="info-label">Sequence Status</span><span class="info-value">${acc.sequence_status || '—'}</span></div>
    </div>
    <div class="dive-card">
      <div class="dive-card-title">Tech Stack</div>
      <div class="tech-pills">
        ${techTools.length ? techTools.map(t => `<span class="tech-pill ${techPillClass(t)}">${t}</span>`).join('') : '<span style="font-size:11px;color:var(--text-muted)">No tech stack data</span>'}
      </div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:9px;font-family:\'IBM Plex Mono\',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">Procore</div>
        <span class="pill ${acc.procore_user === 'Yes' ? 'peer-yes' : acc.procore_user === 'No' ? 'peer-no' : 'peer-unknown'}">${acc.procore_user || 'Unknown'}</span>
        <span style="margin-left:12px;font-size:9px;font-family:\'IBM Plex Mono\',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Bluebeam</span>
        <span class="pill ${acc.bluebeam_user === 'Yes' ? 'peer-yes' : acc.bluebeam_user === 'No' ? 'peer-no' : 'peer-unknown'}" style="margin-left:6px">${acc.bluebeam_user || 'Unknown'}</span>
        <span style="margin-left:12px;font-size:9px;font-family:\'IBM Plex Mono\',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Autodesk</span>
        <span class="pill ${acc.autodesk_acc_user === 'Yes' ? 'peer-yes' : acc.autodesk_acc_user === 'No' ? 'peer-no' : 'peer-unknown'}" style="margin-left:6px">${acc.autodesk_acc_user || 'Unknown'}</span>
      </div>
    </div>
    <div class="dive-card">
      <div class="dive-card-title">Project Types</div>
      <div class="tech-pills">
        ${projectTypes.length ? projectTypes.map(t => `<span class="tech-pill">${t.trim()}</span>`).join('') : '<span style="font-size:11px;color:var(--text-muted)">—</span>'}
      </div>
      ${acc.notes ? `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-mid);line-height:1.7">${acc.notes}</div>` : ''}
    </div>
  </div>

  <div class="section-label" style="margin-top:8px">Contacts — ${contacts.length} mapped</div>`;

  if (contacts.length) {
    html += `<div style="background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:40px">
      <table class="contacts-table">
        <thead><tr><th>#</th><th>Name</th><th>Title</th><th>Email</th><th>Location</th><th>Status</th></tr></thead>
        <tbody>`;
    contacts.forEach((c, i) => {
      const liLink = c.contact_linkedin ? `<a href="${c.contact_linkedin}" target="_blank" class="contact-link" title="LinkedIn">↗</a>` : '';
      const emailLink = c.contact_email ? `<a href="mailto:${c.contact_email}" style="color:var(--lt-red);text-decoration:none">${c.contact_email}</a>` : '—';
      html += `<tr>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-faint)">${i + 1}</td>
        <td><span class="contact-name">${c.contact_name}</span>${liLink}</td>
        <td style="max-width:220px;line-height:1.4">${c.contact_title || '—'}</td>
        <td style="font-size:10px">${emailLink}</td>
        <td style="font-size:10px;color:var(--text-muted)">${c.location ? c.location.replace(', United States','') : '—'}</td>
        <td><span class="status-pill">${c.sequence_status || 'Not Started'}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  } else {
    html += `<div style="background:var(--white);border:1px solid var(--border);border-radius:6px;padding:20px;font-size:12px;color:var(--text-muted);margin-bottom:40px">No contacts mapped yet for this account. Run People Search in Clay to populate.</div>`;
  }

  el.innerHTML = html;
}

// ── SCORECARD ──
function renderScorecard() {
  const el = document.getElementById('view-scorecard');
  if (!ACCOUNTS.length) { el.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading…</div></div>'; return; }

  const sorted = [...ACCOUNTS].sort((a, b) => {
    const key = scorecardSort.key;
    const va = key === 'icp_score' || key === 'projects_per_year'
      ? parseFloat((a[key] || '0').replace("'",""))
      : (a[key] || '').toLowerCase();
    const vb = key === 'icp_score' || key === 'projects_per_year'
      ? parseFloat((b[key] || '0').replace("'",""))
      : (b[key] || '').toLowerCase();
    if (va < vb) return scorecardSort.dir;
    if (va > vb) return -scorecardSort.dir;
    return 0;
  });

  function th(label, key) {
    const active = scorecardSort.key === key;
    const arrow = active ? (scorecardSort.dir === -1 ? ' ↓' : ' ↑') : '';
    return `<th class="${active ? 'sorted' : ''}" onclick="setScorecardSort('${key}')">${label}${arrow}</th>`;
  }

  function miniBar(score, cls) {
    return `<div style="display:flex;align-items:center;gap:7px">
      <div style="width:72px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0">
        <div style="width:${parseFloat(score||0)*10}%;height:100%;border-radius:3px;background:var(--${cls === 'tier1' ? 'tier1' : cls === 'tier2' ? 'tier2' : 'tier3'})"></div>
      </div>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text-mid)">${score || '—'}</span>
    </div>`;
  }

  let html = `<div class="section-label">Account Scorecard — sorted by ${scorecardSort.key}</div>
    <table class="score-table">
      <thead><tr>
        <th>#</th>
        ${th('Account', 'company_name')}
        ${th('Segment', 'segment')}
        ${th('ICP Score', 'icp_score')}
        ${th('Tier', 'icp_tier')}
        <th>Peer Review</th>
        <th>Phase</th>
        ${th('Projects/yr', 'projects_per_year')}
        <th>Tech Stack</th>
        <th>Contacts</th>
        <th>Status</th>
      </tr></thead>
      <tbody>`;

  sorted.forEach((acc, i) => {
    const tc = tierClass(acc.icp_tier);
    const contacts = contactsForAccount(acc.company_name);
    const techTools = acc.tech_stack ? acc.tech_stack.split('|').map(t => t.trim()).filter(Boolean) : [];
    const accentColor = tc === 'tier1' ? 'var(--tier1)' : tc === 'tier2' ? 'var(--tier2)' : 'var(--tier3)';

    html += `<tr onclick="openDiveFromScorecard('${acc.company_name.replace(/'/g,"\\'")}')">
      <td style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-faint)">${i + 1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:3px;height:30px;border-radius:2px;background:${accentColor};flex-shrink:0"></div>
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text)">${acc.company_name}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:1px">${acc.hq_location || '—'}</div>
          </div>
        </div>
      </td>
      <td><span class="seg-tag ${segClass(acc.segment)}">${acc.segment || '—'}</span></td>
      <td>${miniBar(acc.icp_score, tc)}</td>
      <td><span class="icp-badge ${tc}">${acc.icp_tier || '—'}</span></td>
      <td><span class="pill ${peerClass(acc.peer_review_confirmed)}">${acc.peer_review_confirmed || 'Unknown'}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:10px">${acc.current_phase || '—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${acc.projects_per_year ? acc.projects_per_year.replace("'","") : '—'}</td>
      <td><div style="display:flex;gap:3px;flex-wrap:wrap">${techTools.slice(0,2).map(t => `<span class="tech-pill ${techPillClass(t)}" style="font-size:9px">${t}</span>`).join('')}${techTools.length > 2 ? `<span class="tech-pill" style="font-size:9px">+${techTools.length-2}</span>` : ''}</div></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center">${contacts.length}</td>
      <td><span class="status-pill">${acc.sequence_status || 'Not Started'}</span></td>
    </tr>`;
  });

  html += `</tbody></table>`;
  el.innerHTML = html;
}

window.setScorecardSort = function(key) {
  if (scorecardSort.key === key) scorecardSort.dir *= -1;
  else scorecardSort = { key, dir: -1 };
  renderScorecard();
};

function openDiveFromScorecard(name) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
  document.getElementById('view-scorecard').style.display = 'none';
  document.getElementById('view-accounts').style.display = 'block';
  openDive(name);
}

// ── INIT ──
document.getElementById('view-accounts').innerHTML = '<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading from Google Sheets…</div></div>';
loadData();
</script>
</body>
