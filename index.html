<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightTable — Account Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f2;--white:#ffffff;--border:#e4e0d8;--border-dark:#c8c3b8;
  --text:#1c1a17;--text-mid:#4a4640;--text-muted:#8a857c;--text-faint:#b8b3aa;
  --lt-red:#c0392b;--lt-red-light:#fdf0ee;--lt-red-mid:#e8b4ae;
  --tier1:#1a6b4a;--tier1-light:#e8f5ee;--tier1-mid:#b8deca;
  --tier2:#b05c00;--tier2-light:#fdf0e0;--tier2-mid:#f0c88a;
  --tier3:#4a4640;--tier3-light:#f0eeeb;--tier3-mid:#c8c3b8;
  --peer-yes:#1a6b4a;--peer-yes-bg:#e8f5ee;
  --peer-no:#c0392b;--peer-no-bg:#fdf0ee;
  --peer-unknown:#8a857c;--peer-unknown-bg:#f0eeeb;
  --seg-dev:#1a4f8a;--seg-dev-bg:#e8f0fb;
  --seg-gc:#6a1a8a;--seg-gc-bg:#f0e8fb;
  --seg-reif:#1a6b4a;--seg-reif-bg:#e8f5ee;
  --seg-dc:#b05c00;--seg-dc-bg:#fdf0e0;
  --signal-pre:#1a4f8a;--signal-pre-bg:#e8f0fb;--signal-pre-mid:#a8c4e8;
  --signal-comp:#1a6b4a;--signal-comp-bg:#e8f5ee;--signal-comp-mid:#b8deca;
  --signal-none:#8a857c;--signal-none-bg:#f0eeeb;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
.header{background:var(--text);color:var(--white);padding:24px 40px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:16px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--white);letter-spacing:-.01em;}
.logo span{color:var(--lt-red);}
.header-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);}
.header-divider{width:1px;height:32px;background:rgba(255,255,255,.15);}
.header-stats{display:flex;gap:32px;}
.header-stat{display:flex;flex-direction:column;gap:2px;}
.header-stat-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:var(--white);line-height:1;}
.header-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;color:rgba(255,255,255,.7);font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.refresh-btn:hover{background:rgba(255,255,255,.14);color:var(--white);}
.refresh-btn.spinning svg{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.page{max-width:1400px;margin:0 auto;padding:40px 40px 80px;}
.nav{display:flex;gap:0;border-bottom:2px solid var(--text);margin-bottom:40px;}
.nav-tab{padding:10px 22px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--lt-red);font-weight:600;}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border-dark);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--text);color:var(--text);}
.filter-btn.active{background:var(--text);color:var(--white);border-color:var(--text);}
.account-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.account-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:box-shadow .15s,transform .15s;position:relative;overflow:hidden;}
.account-card:hover{box-shadow:0 6px 28px rgba(0,0,0,.1);transform:translateY(-2px);}
.account-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.account-card.tier1::before{background:var(--tier1);}
.account-card.tier2::before{background:var(--tier2);}
.account-card.tier3::before{background:var(--tier3);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.2;}
.card-segment{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:3px;}
.icp-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.icp-badge.tier1{background:var(--tier1-light);color:var(--tier1);border:1px solid var(--tier1-mid);}
.icp-badge.tier2{background:var(--tier2-light);color:var(--tier2);border:1px solid var(--tier2-mid);}
.icp-badge.tier3{background:var(--tier3-light);color:var(--tier3);border:1px solid var(--tier3-mid);}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.score-num{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:500;color:var(--text);line-height:1;}
.score-denom{font-size:11px;color:var(--text-muted);}
.score-track{flex:1;height:5px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.score-fill{height:100%;border-radius:3px;transition:width .4s;}
.score-fill.tier1{background:var(--tier1);}
.score-fill.tier2{background:var(--tier2);}
.score-fill.tier3{background:var(--tier3);}
.card-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.pill{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text-mid);white-space:nowrap;}
.pill.peer-yes{background:var(--peer-yes-bg);color:var(--peer-yes);border-color:var(--tier1-mid);}
.pill.peer-unknown{background:var(--peer-unknown-bg);color:var(--peer-unknown);}
.pill.peer-no{background:var(--peer-no-bg);color:var(--peer-no);border-color:var(--lt-red-mid);}
.signal-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.signal-tag.pre-construction{background:var(--signal-pre-bg);color:var(--signal-pre);border:1px solid var(--signal-pre-mid);}
.signal-tag.recently-completed{background:var(--signal-comp-bg);color:var(--signal-comp);border:1px solid var(--signal-comp-mid);}
.signal-tag.no-signal{background:var(--signal-none-bg);color:var(--signal-none);border:1px solid var(--border);}
.persona-bars{display:flex;flex-direction:column;gap:4px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;}
.pb-row{display:flex;align-items:center;gap:8px;}
.pb-label{font-size:9px;color:var(--text-muted);width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;background:var(--text);opacity:.3;}
.pb-pct{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted);width:28px;text-align:right;flex-shrink:0;}
.card-meta{display:flex;gap:16px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;}
.card-meta-item{display:flex;flex-direction:column;gap:2px;}
.card-meta-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
.card-meta-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}
.seg-tag{display:inline-flex;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.seg-tag.Developer{background:var(--seg-dev-bg);color:var(--seg-dev);}
.seg-tag.GC{background:var(--seg-gc-bg);color:var(--seg-gc);}
.seg-tag.REIF{background:var(--seg-reif-bg);color:var(--seg-reif);}
.seg-tag.DC{background:var(--seg-dc-bg);color:var(--seg-dc);}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:28px;border:none;background:none;padding:0;transition:color .15s;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
.back-btn:hover{color:var(--text);}
.back-btn::before{content:'←';}
.dive-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:20px;}
.dive-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);line-height:1.1;}
.dive-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
.dive-stats{display:flex;gap:24px;flex-wrap:wrap;}
.dive-stat{display:flex;flex-direction:column;gap:2px;text-align:right;}
.dive-stat-val{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--text);line-height:1;}
.dive-stat-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.dive-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
@media(max-width:900px){.dive-grid{grid-template-columns:1fr;}}
.dive-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:20px 22px;}
.dive-card-title{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-mid);margin-bottom:12px;}
.info-row{display:flex;gap:8px;align-items:baseline;margin-bottom:7px;}
.info-label{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);width:120px;flex-shrink:0;}
.info-value{font-size:12px;color:var(--text-mid);line-height:1.5;}
.peer-block{border-radius:6px;padding:14px 16px;margin-bottom:4px;}
.peer-block.yes{background:var(--peer-yes-bg);border:1px solid var(--tier1-mid);}
.peer-block.unknown{background:var(--peer-unknown-bg);border:1px solid var(--border);}
.peer-block.no{background:var(--peer-no-bg);border:1px solid var(--lt-red-mid);}
.peer-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
.peer-block.yes .peer-label{color:var(--tier1);}
.peer-block.unknown .peer-label{color:var(--peer-unknown);}
.peer-block.no .peer-label{color:var(--lt-red);}
.peer-headline{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text);line-height:1.3;}
.signal-block{border-radius:6px;padding:16px 18px;}
.signal-block.pre-construction{background:var(--signal-pre-bg);border:1px solid var(--signal-pre-mid);}
.signal-block.recently-completed{background:var(--signal-comp-bg);border:1px solid var(--signal-comp-mid);}
.signal-block.no-signal{background:var(--signal-none-bg);border:1px solid var(--border);}
.signal-type-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.signal-block.pre-construction .signal-type-label{color:var(--signal-pre);}
.signal-block.recently-completed .signal-type-label{color:var(--signal-comp);}
.signal-block.no-signal .signal-type-label{color:var(--signal-none);}
.signal-headline{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3;}
.signal-detail{font-size:11px;color:var(--text-mid);line-height:1.7;}
.tech-pills{display:flex;flex-wrap:wrap;gap:5px;}
.tech-pill{padding:3px 9px;border-radius:3px;font-size:10px;background:var(--bg);border:1px solid var(--border-dark);color:var(--text-mid);}
.tech-pill.procore{background:#e8f0fb;color:#1a4f8a;border-color:#a8c4e8;}
.tech-pill.bluebeam{background:#fdf0e0;color:#b05c00;border-color:#f0c88a;}
.tech-pill.autodesk{background:#fce8e8;color:#8a1a1a;border-color:#f4c0c0;}
.fn-bars{display:flex;flex-direction:column;gap:6px;}
.fn-row{display:flex;align-items:center;gap:8px;}
.fn-label{font-size:11px;color:var(--text-mid);width:200px;flex-shrink:0;}
.fn-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.fn-fill{height:100%;border-radius:3px;background:var(--text);opacity:.4;}
.fn-pct{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted);width:36px;text-align:right;flex-shrink:0;}
.contact-block{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px;}
.contact-row{display:grid;grid-template-columns:28px 1fr 1.2fr 1fr 0.8fr auto;gap:0;align-items:center;padding:12px 14px;background:var(--white);cursor:pointer;transition:background .12s;}
.contact-row:hover{background:#faf9f7;}
.contact-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-faint);}
.contact-name-cell{font-weight:600;color:var(--text);font-size:12px;display:flex;align-items:center;gap:5px;}
.contact-title-cell{font-size:11px;color:var(--text-mid);line-height:1.4;padding:0 12px;}
.contact-email-cell{font-size:10px;}
.contact-email-cell a{color:var(--lt-red);text-decoration:none;}
.contact-email-cell a:hover{text-decoration:underline;}
.contact-loc-cell{font-size:10px;color:var(--text-muted);padding:0 12px;}
.contact-link{color:var(--lt-red);text-decoration:none;font-size:10px;opacity:.6;transition:opacity .15s;}
.contact-link:hover{opacity:1;}
.toggle-msg-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border:1px solid var(--border-dark);background:var(--white);padding:4px 10px;border-radius:3px;transition:all .12s;white-space:nowrap;}
.toggle-msg-btn:hover{color:var(--lt-red);border-color:var(--lt-red-mid);}
.messaging-panel{background:#faf9f7;border-top:1px solid var(--border);padding:16px 16px 16px 42px;display:none;}
.messaging-panel.open{display:block;}
.msg-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.msg-persona-label{font-size:11px;font-weight:600;color:var(--text);}
.msg-subject-line{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--white);border:1px solid var(--border);border-radius:3px;font-size:10px;color:var(--text-mid);font-family:'IBM Plex Mono',monospace;margin-left:auto;}
.msg-subject-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-right:2px;}
.msg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.msg-col-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.msg-hook{font-size:11px;color:var(--text);line-height:1.75;font-style:italic;}
.msg-angle{font-size:11px;color:var(--text-mid);line-height:1.75;}
.msg-avoid{font-size:11px;color:var(--lt-red);line-height:1.75;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
.error-block{background:#fdf0ee;border:1px solid var(--lt-red-mid);border-radius:6px;padding:16px 20px;font-size:12px;color:var(--lt-red);}
.score-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.score-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border-dark);background:var(--bg);cursor:pointer;user-select:none;white-space:nowrap;}
.score-table th:hover{color:var(--text);}
.score-table th.sorted{color:var(--text);}
.score-table td{font-size:11px;padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-mid);}
.score-table tr:last-child td{border-bottom:none;}
.score-table tr:hover td{background:#faf9f7;cursor:pointer;}
@media(max-width:768px){.page{padding:24px 16px 60px;}.header{padding:16px;}.dive-grid{grid-template-columns:1fr;}.msg-grid{grid-template-columns:1fr;}.contact-row{grid-template-columns:1fr;}}
</style>
</head>

function tierClass(t){if(!t)return'tier3';if(t.includes('1'))return'tier1';if(t.includes('2'))return'tier2';return'tier3';}
function segClass(s){if(!s)return'';if(s.includes('Developer'))return'Developer';if(s.includes('GC')||s.includes('CMAR'))return'GC';if(s.includes('REIF'))return'REIF';if(s.includes('Data Center'))return'DC';return'';}
function peerClass(v){if(v==='Yes')return'peer-yes';if(v==='No')return'peer-no';return'peer-unknown';}
function techPillClass(t){const l=t.toLowerCase();if(l.includes('procore'))return'procore';if(l.includes('bluebeam'))return'bluebeam';if(l.includes('autodesk'))return'autodesk';return'';}
function scoreColor(s){const n=parseFloat(s);if(n>=8)return'tier1';if(n>=6)return'tier2';return'tier3';}
function contactsForAccount(name){return CONTACTS.filter(c=>c.company_name&&c.company_name.trim().toLowerCase()===name.trim().toLowerCase());}
function inferPersona(title){if(!title)return'Other';const t=title.toLowerCase();if(t.includes('vdc')||t.includes('bim')||t.includes('innovation'))return'Innovation / VDC';if(t.includes('preconstruction')||t.includes('pre-construction')||t.includes('pre construction'))return'Preconstruction';if(t.includes('procurement'))return'Procurement';if(t.includes('asset management')||t.includes('investments')||t.includes('pre-development'))return'Investment / Asset Mgmt';if(t.includes('sustainability'))return'Sustainability / Innovation';if(t.includes('construction')||t.includes('development'))return'Construction / Development';return'Other';}
function getSignalType(acc){if(acc.project_status){if(acc.project_status.toLowerCase().includes('pre'))return'pre-construction';if(acc.project_status.toLowerCase().includes('complet'))return'recently-completed';}const i=ACCOUNT_INTEL[acc.company_name];return i?i.signal_type:'no-signal';}
function getSignalLabel(type){if(type==='pre-construction')return'Pre-Construction';if(type==='recently-completed')return'Recently Completed';return'No Signal';}
function buildPersonaBreakdown(contacts){const counts={};contacts.forEach(c=>{const p=inferPersona(c.contact_title);counts[p]=(counts[p]||0)+1;});return Object.entries(counts).sort((a,b)=>b[1]-a[1]);}
function getContactMessaging(contact,acc){
  if(contact.outreach_hook)return{hook:contact.outreach_hook,angle:contact.message_angle||'',avoid:contact.avoid||'',subject:contact.subject_line||''};
  if(CONTACT_MESSAGING[contact.contact_name])return CONTACT_MESSAGING[contact.contact_name];
  const signalType=getSignalType(acc);const seg=acc.segment||'';const peer=acc.peer_review_confirmed||'Unknown';
  let hook='',angle='',avoid='',subject='';
  if(signalType==='pre-construction'){hook=`With active projects moving through design development, the cost of coordination errors that slip through peer review shows up as change orders after bid. How is your team managing that exposure on current projects?`;subject=`Design coordination exposure on ${acc.company_name}'s active pipeline`;}
  else if(signalType==='recently-completed'){hook=`Your team just wrapped a major project — the RFI log usually tells the real story of what peer review caught versus what made it to the field. I'd be curious what that looked like and whether you're seeing the same patterns on your next project.`;subject=`What ${acc.company_name}'s last project RFI log revealed`;}
  else{hook=`The gap between what peer review catches and what shows up as a field problem is something most construction teams know well. I'd be curious how you're managing that exposure at ${acc.company_name}.`;subject=`Design coordination risk at ${acc.company_name}`;}
  if(seg.includes('GC')||seg.includes('CMAR')){angle='GC carrying project risk — focus on bid accuracy and the cost of coordination errors. Change orders come out of their margin.';avoid="Don't lead with AI. Lead with project risk and bid accuracy.";}
  else if(seg.includes('REIF')){angle='Investment firm — focus on portfolio-level derisking and financial impact of change orders on returns.';avoid="Don't pitch process improvement. Pitch financial risk reduction across the portfolio.";}
  else{angle=`Developer — ${peer==='Yes'?'peer review confirmed, position as making their existing process faster and more comprehensive':'peer review status unknown, qualify this first'}.`;avoid=peer==='Unknown'?"Don't pitch before confirming whether they have a formal peer review process.":"Don't question their existing peer review. Position as augmenting it.";}
  return{hook,angle,avoid,subject};
}

async function loadData(){
  const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');
  try{
    const headers={'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
    const [accRes,conRes]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/accounts?select=*`,{headers}),
      fetch(`${SUPABASE_URL}/rest/v1/contacts?select=*`,{headers})
    ]);
    const accounts=await accRes.json();
    const contacts=await conRes.json();
    ACCOUNTS=(Array.isArray(accounts)?accounts:[]).filter(a=>a.company_name&&a.company_name.trim());
    CONTACTS=(Array.isArray(contacts)?contacts:[]).filter(c=>c.contact_name&&c.contact_name.trim());
    updateStats();renderCurrentView();
  }catch(e){document.getElementById('view-accounts').innerHTML=`<div class="error-block">Failed to load data from n8n. Make sure the LightTable workflow is active.<br><br>Error: ${e.message}</div>`;}
  btn.classList.remove('spinning');
}
function updateStats(){
  document.getElementById('stat-accounts').textContent=ACCOUNTS.length;
  document.getElementById('stat-contacts').textContent=CONTACTS.length;
  document.getElementById('stat-peer').textContent=ACCOUNTS.filter(a=>a.peer_review_confirmed==='Yes').length;
  document.getElementById('stat-tier1').textContent=ACCOUNTS.filter(a=>a.icp_tier==='Tier 1').length;
}
function showView(view,btn){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('#view-accounts,#view-scorecard').forEach(e=>e.style.display='none');document.getElementById(`view-${view}`).style.display='block';if(view==='accounts')renderAccounts();else if(view==='scorecard')renderScorecard();}
function renderCurrentView(){const activeTab=document.querySelector('.nav-tab.active');const view=activeTab?activeTab.getAttribute('onclick').match(/'(\w+)'/)[1]:'accounts';if(view==='accounts')renderAccounts();else if(view==='scorecard')renderScorecard();}

function renderAccounts(){

  const sorted=[...ACCOUNTS].sort((a,b)=>parseFloat(b.icp_score||0)-parseFloat(a.icp_score||0));

    if(!show)return;
    html+=`<div class="account-card ${tc}" onclick="openDive('${acc.company_name.replace(/'/g,"\\'")}')">
      <div class="card-top"><div><div class="card-name">${acc.company_name}</div><div class="card-segment">${acc.segment||'—'} · ${acc.hq_location||'—'}</div></div><div class="icp-badge ${tc}">${acc.icp_tier||'—'}</div></div>

    </div>`;
  });
  html+=`</div>`;el.innerHTML=html;

          <div style="display:flex;gap:6px;align-items:center">
            <button class="toggle-msg-btn" id="btn-${msgId}">Messaging</button>
            ${hasEmail?`<a href="${gmailUrl}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:3px;font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;font-weight:600;background:var(--lt-red-light);color:var(--lt-red);border:1px solid var(--lt-red-mid);text-decoration:none;white-space:nowrap;transition:all .12s" onmouseover="this.style.background='var(--lt-red)';this.style.color='white'" onmouseout="this.style.background='var(--lt-red-light)';this.style.color='var(--lt-red)'">✉ Draft in Gmail</a>`:''}
          </div>
        </div>
        <div class="messaging-panel" id="${msgId}">
          <div class="msg-header">
            <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)">Persona:</span>
            <span class="msg-persona-label">${persona}</span>
            <span class="signal-tag ${signalType}">${getSignalLabel(signalType)}</span>
            ${gmailSubject?`<div class="msg-subject-line"><span class="msg-subject-lbl">Subject:</span>${gmailSubject}</div>`:''}
          </div>
          ${gmailBody?`<div style="background:var(--white);border:1px solid var(--border);border-radius:4px;padding:14px 16px;margin-bottom:14px;font-size:11px;color:var(--text-mid);line-height:1.8;white-space:pre-wrap">${gmailBody}</div>`:''}
          <div class="msg-grid">
            <div><div class="msg-col-label">Opening Hook</div><div class="msg-hook">"${msg.hook}"</div></div>
            <div><div class="msg-col-label">Message Angle</div><div class="msg-angle">${msg.angle}</div></div>
            <div><div class="msg-col-label">Avoid</div><div class="msg-avoid">${msg.avoid}</div></div>
          </div>
        </div>
      </div>`;
    });
  }else{html+=`<div style="background:var(--white);border:1px solid var(--border);border-radius:6px;padding:20px;font-size:12px;color:var(--text-muted)">No contacts mapped yet. Run People Search in Clay to populate.</div>`;}
  el.innerHTML=html;
}

window.toggleMsg=function(id){const panel=document.getElementById(id);const btn=document.getElementById('btn-'+id);if(!panel)return;const isOpen=panel.classList.contains('open');panel.classList.toggle('open');if(btn)btn.textContent=isOpen?'Messaging':'Hide Messaging';};

window.deleteAccount = async function(name) {
  if (!confirm('Remove ' + name + ' from the dashboard?')) return;
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/accounts?company_name=eq.${encodeURIComponent(name)}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    ACCOUNTS = ACCOUNTS.filter(a => a.company_name !== name);
    updateStats();
    renderAccounts();
  } catch(e) {
    alert('Delete failed: ' + e.message);
  }
};

function renderScorecard(){
  const el=document.getElementById('view-scorecard');
  if(!ACCOUNTS.length){el.innerHTML='<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div>';return;}
  const sorted=[...ACCOUNTS].sort((a,b)=>{const key=scorecardSort.key;const va=key==='icp_score'||key==='projects_per_year'?parseFloat((a[key]||'0').replace("'","")):(a[key]||'').toLowerCase();const vb=key==='icp_score'||key==='projects_per_year'?parseFloat((b[key]||'0').replace("'","")):(b[key]||'').toLowerCase();if(va<vb)return scorecardSort.dir;if(va>vb)return-scorecardSort.dir;return 0;});
  function th(label,key){const active=scorecardSort.key===key;const arrow=active?(scorecardSort.dir===-1?' ↓':' ↑'):'';return`<th class="${active?'sorted':''}" onclick="setScorecardSort('${key}')">${label}${arrow}</th>`;}
  function miniBar(score,cls){return`<div style="display:flex;align-items:center;gap:7px"><div style="width:72px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0"><div style="width:${parseFloat(score||0)*10}%;height:100%;border-radius:3px;background:var(--${cls==='tier1'?'tier1':cls==='tier2'?'tier2':'tier3'})"></div></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text-mid)">${score||'—'}</span></div>`;}
  let html=`<div class="section-label">Account Scorecard</div><table class="score-table"><thead><tr><th>#</th>${th('Account','company_name')}${th('Segment','segment')}${th('ICP Score','icp_score')}${th('Tier','icp_tier')}<th>Peer Review</th><th>Signal</th><th>Phase</th>${th('Projects/yr','projects_per_year')}<th>Contacts</th><th>Status</th></tr></thead><tbody>`;
  sorted.forEach((acc,i)=>{
    const tc=tierClass(acc.icp_tier);const contacts=contactsForAccount(acc.company_name);
    const accentColor=tc==='tier1'?'var(--tier1)':tc==='tier2'?'var(--tier2)':'var(--tier3)';const signalType=getSignalType(acc);
    html+=`<tr onclick="openDiveFromScorecard('${acc.company_name.replace(/'/g,"\\'")}')">
      <td style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-faint)">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div style="width:3px;height:30px;border-radius:2px;background:${accentColor};flex-shrink:0"></div><div><div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--text)">${acc.company_name}</div><div style="font-size:9px;color:var(--text-muted);margin-top:1px">${acc.hq_location||'—'}</div></div></div></td>
      <td><span class="seg-tag ${segClass(acc.segment)}">${acc.segment||'—'}</span></td>
      <td>${miniBar(acc.icp_score,tc)}</td>
      <td><span class="icp-badge ${tc}">${acc.icp_tier||'—'}</span></td>
      <td><span class="pill ${peerClass(acc.peer_review_confirmed)}">${acc.peer_review_confirmed||'Unknown'}</span></td>
      <td><span class="signal-tag ${signalType}" style="font-size:8px">${getSignalLabel(signalType)}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:10px">${acc.current_phase||'—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${acc.projects_per_year?acc.projects_per_year.replace("'",""):'—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center">${contacts.length}</td>
      <td><span style="display:inline-flex;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.04em;background:var(--bg);border:1px solid var(--border-dark);color:var(--text-muted)">${acc.sequence_status||'Not Started'}</span></td>
    </tr>`;
  });
  html+=`</tbody></table>`;el.innerHTML=html;
}
window.setScorecardSort=function(key){if(scorecardSort.key===key)scorecardSort.dir*=-1;else scorecardSort={key,dir:-1};renderScorecard();};
function openDiveFromScorecard(name){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.nav-tab')[0].classList.add('active');document.getElementById('view-scorecard').style.display='none';document.getElementById('view-accounts').style.display='block';openDive(name);}

document.getElementById('view-accounts').innerHTML='<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading from n8n...</div></div>';
loadData();
</script>
</body>
</html>
